<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
  <defs>
    <linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'>
      <stop offset='0%' style='stop-color:#00d4ff;stop-opacity:1' />
      <stop offset='100%' style='stop-color:#0099ff;stop-opacity:1' />
    </linearGradient>
    <filter id='glow'>
      <feGaussianBlur stdDeviation='2' result='coloredBlur'/>
      <feMerge>
        <feMergeNode in='coloredBlur'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width='64' height='64' fill='#0a0e27' rx='12'/>
  
  <!-- Grid pattern background -->
  <g stroke='#1a2a4a' stroke-width='0.5' opacity='0.3'>
    <line x1='0' y1='16' x2='64' y2='16'/>
    <line x1='0' y1='32' x2='64' y2='32'/>
    <line x1='0' y1='48' x2='64' y2='48'/>
    <line x1='16' y1='0' x2='16' y2='64'/>
    <line x1='32' y1='0' x2='32' y2='64'/>
    <line x1='48' y1='0' x2='48' y2='64'/>
  </g>
  
  <!-- Glow effect circle -->
  <circle cx='32' cy='32' r='28' fill='none' stroke='url(#grad)' stroke-width='1' opacity='0.2' filter='url(#glow)'/>
  
  <!-- Main text: DE -->
  <text x='32' y='42' font-family='Space Grotesk, monospace' font-size='32' font-weight='700' text-anchor='middle' fill='url(#grad)' filter='url(#glow)'>DE</text>
  
  <!-- Code brackets -->
  <text x='14' y='42' font-family='Space Grotesk, monospace' font-size='20' font-weight='700' fill='url(#grad)' opacity='0.7'>&lt;</text>
  <text x='50' y='42' font-family='Space Grotesk, monospace' font-size='20' font-weight='700' fill='url(#grad)' opacity='0.7'>/&gt;</text>
  
  <!-- Accent dots -->
  <circle cx='12' cy='12' r='2' fill='url(#grad)' opacity='0.8'/>
  <circle cx='52' cy='52' r='2' fill='url(#grad)' opacity='0.8'/>
</svg>