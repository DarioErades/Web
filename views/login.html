<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --text: #ffffff; --primary: #b8ff3a; --card: #141414; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: var(--card); padding: 2.5rem; border-radius: 12px; border: 1px solid #222; width: 100%; max-width: 350px; text-align: center; }
        h1 { margin-bottom: 2rem; font-size: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; color: #888; font-size: 0.9rem; }
        input { width: 100%; padding: 0.8rem; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        input:focus { outline: none; border-color: var(--primary); }
        button { width: 100%; padding: 0.8rem; background: var(--primary); color: #000; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: transform 0.2s; margin-top: 1rem; font-family: inherit; }
        button:hover { transform: scale(1.02); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Admin Panel</h1>
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" name="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
